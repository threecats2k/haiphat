<svg width="280" height="80" xmlns="http://www.w3.org/2000/svg">
  <!-- Construction Building Icon -->
  <g transform="translate(20, 15)">
    <!-- Building structure -->
    <rect x="0" y="8" width="30" height="25" fill="#c41e3a" rx="2"/>
    <rect x="5" y="15" width="6" height="6" fill="#ffffff" rx="1"/>
    <rect x="19" y="15" width="6" height="6" fill="#ffffff" rx="1"/>
    <rect x="5" y="23" width="6" height="6" fill="#ffffff" rx="1"/>
    <rect x="19" y="23" width="6" height="6" fill="#ffffff" rx="1"/>
    <!-- Roof -->
    <path d="M -2 8 L 15 0 L 32 8 Z" fill="#9a1629"/>
    <!-- Construction crane -->
    <line x1="35" y1="33" x2="35" y2="5" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="5" x2="48" y2="5" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="5" x2="48" y2="18" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="48" cy="18" r="3" fill="#ff6b35"/>
  </g>
  
  <!-- Company Name -->
  <text x="70" y="32" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#c41e3a" letter-spacing="0.5px">HAI PHAT</text>
  <text x="70" y="52" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#2c2c2c" letter-spacing="1px">IDC.,JSC</text>
</svg>
